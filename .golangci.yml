version: "2"

linters:
  settings:
    staticcheck:
      checks:
        - all
        - -ST1000   # missing doc comment on package
        - -ST1003   # underscores in identifiers
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Allow unchecked Close() in test cleanup/defer blocks.
      - path: _test\.go$
        linters:
          - errcheck

formatters:
  enable:
    - gofumpt
    - goimports
